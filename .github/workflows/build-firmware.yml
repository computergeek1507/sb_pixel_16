name: Build Firmware

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - '.github/workflows/build-firmware.yml'
  pull_request:
    paths:
      - 'firmware/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - hw: HW1
            extra_flags: ""
          - hw: HW2
            extra_flags: "-DHW_VERSION=2"
    name: Build ${{ matrix.hw }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core (3.3.8)
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.8

      - name: Install libraries
        run: |
          arduino-cli lib install \
            "ArduinoJson" \
            "Adafruit GFX Library" \
            "Adafruit SSD1306" \
            "Adafruit BusIO"
          arduino-cli lib install --git-url https://github.com/ESP32Async/AsyncTCP
          arduino-cli lib install --git-url https://github.com/ESP32Async/ESPAsyncWebServer

      - name: Compile ${{ matrix.hw }}
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32p4:PSRAM=enabled" \
            --build-property "compiler.cpp.extra_flags=${{ matrix.extra_flags }}" \
            --output-dir "build/${{ matrix.hw }}" \
            --warnings default \
            firmware/SBPixel16/SBPixel16.ino

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SBPixel16-${{ matrix.hw }}
          path: |
            build/${{ matrix.hw }}/SBPixel16.ino.bin
            build/${{ matrix.hw }}/SBPixel16.ino.merged.bin
            build/${{ matrix.hw }}/SBPixel16.ino.bootloader.bin
            build/${{ matrix.hw }}/SBPixel16.ino.partitions.bin
          if-no-files-found: error
